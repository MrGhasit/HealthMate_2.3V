name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system packages
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip wget \
          openjdk-17-jdk \
          build-essential libffi-dev libssl-dev \
          python3-dev autoconf libtool \
          pkg-config cmake libltdl-dev

    - name: Set JAVA_HOME
      run: |
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

    - name: Install Android SDK cmdline-tools manually
      run: |
        SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $SDK_ROOT/cmdline-tools

        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O /tmp/cmdline-tools.zip
        unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools-tmp
        mv /tmp/cmdline-tools-tmp/cmdline-tools $SDK_ROOT/cmdline-tools/latest

        echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> $GITHUB_ENV
        echo "$SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$SDK_ROOT/platform-tools" >> $GITHUB_PATH

    - name: Accept Android licenses and install SDK components
      run: |
        SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk

        # Принимаем лицензии через файлы
        mkdir -p $SDK_ROOT/licenses
        printf "\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n8933bad161af4178b1185d1a37fbf41ea5269c55" > $SDK_ROOT/licenses/android-sdk-license
        printf "\n84831b9409646a918e30573bab4c9c91346d8abd" >> $SDK_ROOT/licenses/android-sdk-license
        printf "\nd975f751698a77b662f1254ddbeed3901e976f5a" > $SDK_ROOT/licenses/android-sdk-preview-license

        # Устанавливаем нужные компоненты
        yes | $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
          --sdk_root=$SDK_ROOT \
          "platform-tools" \
          "platforms;android-33" \
          "build-tools;33.0.2"

        # Создаём symlink tools/bin/sdkmanager который ищет buildozer
        mkdir -p $SDK_ROOT/tools/bin
        ln -sf $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager $SDK_ROOT/tools/bin/sdkmanager

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer==1.5.0
        pip install "cython>=0.29,<3.1"

    - name: Cache buildozer
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        key: buildozer-${{ hashFiles('buildozer.spec') }}-v3

    - name: Build APK
      run: |
        buildozer -v android debug 2>&1

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: HealthMate-APK
        path: bin/*.apk
